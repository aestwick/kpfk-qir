version: "3.8"
services:
  qir-app:
    build: .
    container_name: qir-app
    restart: unless-stopped
    command: ["npm", "run", "start"]
    ports:
      - "3100:3000"
    env_file: .env
    depends_on:
      - qir-redis
    mem_limit: 1g
    cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qir.rule=Host(`qir.kpfk.org`)"
      - "traefik.http.routers.qir.entrypoints=websecure"
      - "traefik.http.routers.qir.tls.certresolver=mytlschallenge"
      - "traefik.http.services.qir.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"
    networks:
      - traefik
      - default

  qir-worker:
    build: .
    container_name: qir-worker
    restart: unless-stopped
    command: ["npm", "run", "workers"]
    env_file: .env
    depends_on:
      - qir-redis
    volumes:
      - qir-tmp:/tmp/qir-audio
    mem_limit: 2g
    cpus: '1.5'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  qir-redis:
    image: redis:7-alpine
    container_name: qir-redis
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    volumes:
      - redis-data:/data

volumes:
  qir-tmp:
  redis-data:

networks:
  traefik:
    external: true
