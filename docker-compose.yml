version: "3.8"
services:
  qir-app:
    build: .
    container_name: qir-app
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file: .env
    depends_on:
      - qir-redis
    volumes:
      - qir-tmp:/tmp/qir-audio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qir.rule=Host(`qir.kpfk.org`)"
      - "traefik.http.routers.qir.entrypoints=websecure"
      - "traefik.http.routers.qir.tls.certresolver=mytlschallenge"
      - "traefik.http.services.qir.loadbalancer.server.port=3000"
    networks:
      - traefik
      - default

  qir-redis:
    image: redis:7-alpine
    container_name: qir-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  qir-tmp:
  redis-data:

networks:
  traefik:
    external: true
